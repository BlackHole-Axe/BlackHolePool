<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#f97316" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#020208"/>
  <!-- Outer glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- Outer ring (gold) -->
  <circle cx="32" cy="32" r="26" fill="none"
    stroke="#f5a623" stroke-width="2.2"
    stroke-dasharray="0"/>
  <!-- Orbit dot at top of ring -->
  <circle cx="32" cy="6" r="3.2" fill="#f97316"/>
  <!-- Accretion disc ellipse -->
  <ellipse cx="32" cy="36" rx="18" ry="7"
    fill="none" stroke="#c2681a" stroke-width="1.2" opacity="0.7"
    transform="rotate(-10 32 36)"/>
  <!-- Event horizon (black hole center) -->
  <circle cx="32" cy="32" r="10"
    fill="radial-gradient(circle, #000 40%, #1a0800 100%)"
    stroke="#f97316" stroke-width="1.4" opacity="0.9"/>
  <circle cx="32" cy="32" r="10" fill="#050105"/>
  <!-- Inner glow ring -->
  <circle cx="32" cy="32" r="10"
    fill="none" stroke="#f97316" stroke-width="1.4"
    opacity="0.85"/>
  <!-- Lensing arc (bright curved streak) -->
  <path d="M 20 28 Q 32 17 44 28"
    fill="none" stroke="#f9a75a" stroke-width="1.8"
    stroke-linecap="round" opacity="0.65"/>
</svg>
